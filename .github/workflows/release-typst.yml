name: Release Typst PDF

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

concurrency:
  group: release-typst-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Typst
        uses: typst-community/setup-typst@v5
        with:
          cache-dependency-path: typst/main.typ

      - name: Build PDF
        run: |
          mkdir -p dist
          typst compile \
            --font-path typst/fonts \
            typst/main.typ \
            "dist/curriculum-vitae-${GITHUB_REF_NAME}.pdf"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          asset="dist/curriculum-vitae-${tag}.pdf"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$asset" --clobber
          else
            gh release create "$tag" "$asset" \
              --title "$tag" \
              --notes "Typst PDF build for ${tag}."
          fi
